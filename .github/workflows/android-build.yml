name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_RELEASE_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Karda est un projet Expo "managed" : le dossier android/ n'existe
      # pas dans le repo, il est régénéré à chaque build.
      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      # Décode le keystore de release (secret ANDROID_KEYSTORE_BASE64) et
      # patche le build.gradle généré par prebuild pour l'utiliser — sans
      # ces secrets, le gradle généré garde son comportement par défaut
      # (signature "release" avec la clé de debug, encore installable pour
      # tester mais pas pour publier).
      - name: Configure release signing
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/release.keystore" >> "$GITHUB_ENV"
          node scripts/patch-android-signing.js

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Extract version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk "karda-${{ env.APP_VERSION }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: karda-apk
          path: "karda-${{ env.APP_VERSION }}.apk"

      - name: Create/update release with the APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "karda-${{ env.APP_VERSION }}.apk"
          tag: "latest-apk"
          name: "Karda — dernier build (v${{ env.APP_VERSION }})"
          body: |
            Build automatique depuis `${{ github.ref_name }}` (commit ${{ github.sha }}).

            ${{ env.HAS_RELEASE_KEYSTORE == 'true' && '✅ APK signé avec la clé de release.' || '⚠️ APK signé avec la clé de debug — installable pour tester, pas pour publier tel quel.' }}
          allowUpdates: true
          makeLatest: true
